version: 2

project_name: rekord

before:
  hooks:
    - go mod tidy

builds:
  - id: rekord
    main: ./cmd/rekord
    binary: rekord
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Omotolani98/rekord/internal/cli.version={{ .Version }}
  - id: rk
    main: ./cmd/rk
    binary: rk
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Omotolani98/rekord/internal/cli.version={{ .Version }}

archives:
  - id: rekord
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: Omotolani98
    name: rekord

brews:
  - name: rekord
    repository:
      owner: Omotolani98
      name: homebrew-rekord
      token: "{{ .Env.REKORD_TOKEN }}"
    homepage: "https://github.com/Omotolani98/rekord"
    description: "Record terminal workflows as structured session data"
    install: |
      bin.install "rekord"
      bin.install "rk"
    test: |
      system "#{bin}/rekord", "version"
      system "#{bin}/rk", "version"

chocolateys:
  - name: rekord
    title: Rekord
    ids:
      - rekord
    authors: Omotolani
    project_url: "https://github.com/Omotolani98/rekord"
    license_url: "https://github.com/Omotolani98/rekord/blob/main/LICENSE"
    project_source_url: "https://github.com/Omotolani98/rekord"
    package_source_url: "https://github.com/Omotolani98/rekord"
    docs_url: "https://github.com/Omotolani98/rekord/blob/main/README.md"
    bug_tracker_url: "https://github.com/Omotolani98/rekord/issues"
    tags: "cli terminal recording asciinema session devtools"
    summary: "Record terminal workflows as structured session data"
    description: |
      Rekord records terminal workflows as structured session data, then exports
      to Markdown, JSON, asciinema casts, video, and AI handoff bundles.

      Note: interactive recording (start/run) is unix-only; on Windows the export,
      replay, list, commands, and handoff commands operate on existing sessions.
    release_notes: "https://github.com/Omotolani98/rekord/blob/main/CHANGELOG.md"
    api_key: "{{ .Env.CHOCOLATEY_API_KEY }}"
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false
